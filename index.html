<!DOCTYPE html><html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nosso Jogo 💖</title><style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ff4da6, #2b0033);
    color: white;
    overflow-x: hidden;
}

/* Tela inicial */
#startScreen {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.9);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 10;
    text-align: center;
}

#startBtn {
    padding: 15px 30px;
    border-radius: 30px;
    border: none;
    background: #ff4da6;
    color: white;
    font-size: 18px;
    cursor: pointer;
    transition: 0.3s;
}

#startBtn:hover {
    transform: scale(1.1);
    background: #ff1a8c;
}

header {
    text-align: center;
    padding: 40px 20px;
}

.card {
    background: rgba(255,255,255,0.1);
    margin: 20px auto;
    padding: 25px;
    border-radius: 20px;
    max-width: 600px;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 20px rgba(0,0,0,0.4);
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

button {
    background: #ff4da6;
    border: none;
    padding: 10px 18px;
    border-radius: 20px;
    color: white;
    cursor: pointer;
}

.hidden {
    opacity: 0;
    max-height: 0;
    overflow: hidden;
    transition: 0.8s;
}

.show {
    opacity: 1;
    max-height: 200px;
}

.progress {
    position: fixed;
    top: 0;
    left: 0;
    height: 5px;
    background: #ff4da6;
    width: 0%;
}

.heart {
    position: fixed;
    bottom: -10px;
    animation: float 6s linear infinite;
}

@keyframes float {
    0% { transform: translateY(0); opacity:1; }
    100% { transform: translateY(-100vh); opacity:0; }
}
</style></head><body><div class="progress" id="progress"></div><div id="startScreen">
    <h1>🎮 Nosso Jogo 💖</h1>
    <p>Clique para começar</p>
    <button onclick="startGame()">Entrar</button>
</div><audio id="music" loop>
    <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_5b3f3c6c63.mp3" type="audio/mp3">
</audio><header>
    <h1>💖 Nossa História</h1>
    <p>Um jogo que nunca termina...</p>
</header><section><div class="card">
    <h2>Fase 1</h2>
    <p>Você apareceu... e tudo mudou ✨</p>
</div><div class="card">
    <h2>Fase 2</h2>
    <button onclick="reveal('m1', 33)">Desbloquear</button>
    <p id="m1" class="hidden">Você é incrível 💕</p>
</div><div class="card">
    <h2>Fase 3</h2>
    <button onclick="reveal('m2', 66)">Abrir</button>
    <p id="m2" class="hidden">Eu escolheria você sempre 💖</p>
</div><div class="card">
    <h2>Fase Final</h2>
    <button onclick="finale()">Finalizar</button>
</div></section><script>
function startGame() {
    document.getElementById("startScreen").style.display = "none";
    document.getElementById("music").play();
}

function reveal(id, progress) {
    document.getElementById(id).classList.add("show");
    document.getElementById("progress").style.width = progress + "%";
}

function finale() {
    document.getElementById("progress").style.width = "100%";
    alert("💖 Você completou nosso jogo! 💖");
}

setInterval(() => {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "💖";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = Math.random() * 20 + 10 + "px";
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 6000);
}, 300);
</script></body>
</html>
